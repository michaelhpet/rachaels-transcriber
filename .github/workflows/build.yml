name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download ffmpeg binaries
        run: |
          if exist ffmpeg\ffmpeg.exe goto :skip_ffmpeg
          if exist ffmpeg.zip del ffmpeg.zip
          if exist ffmpeg.zip.tmp del ffmpeg.zip.tmp
          echo Downloading ffmpeg (this may take a few minutes)...
          curl -L --progress-bar --max-time 180 --retry 3 --fail "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip.tmp
          if %ERRORLEVEL% neq 0 (
            echo [WARNING] Failed to download ffmpeg.
            if exist ffmpeg.zip.tmp del ffmpeg.zip.tmp
            goto :skip_ffmpeg
          )
          move /y ffmpeg.zip.tmp ffmpeg.zip >nul
          echo Extracting ffmpeg...
          tar -xf ffmpeg.zip
          if %ERRORLEVEL% neq 0 (
            echo [WARNING] Failed to extract ffmpeg.zip (file may be corrupt).
            del ffmpeg.zip
            goto :skip_ffmpeg
          )
          for /d %%i in (ffmpeg-*-essentials_build) do (
            mkdir ffmpeg 2>nul
            move "%%i\bin\ffmpeg.exe" ffmpeg\ >nul
            move "%%i\bin\ffprobe.exe" ffmpeg\ >nul
            rmdir /s /q "%%i"
          )
          if exist ffmpeg\ffmpeg.exe ( echo ffmpeg bundled successfully. ) else ( echo [WARNING] ffmpeg binary not found after extraction. )
          del ffmpeg.zip
          :skip_ffmpeg

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install webrtcvad-wheels

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "RachaelsTranscriber" --add-data "engine.py;." --add-data "assets;assets" --add-data "theme.json;." --add-data "ffmpeg;ffmpeg" --additional-hooks-dir hooks --hidden-import webrtcvad --collect-data faster_whisper --hidden-import download_models --noconfirm --icon assets\icon.ico gui.py

      - name: Set PE metadata (taskbar icon & name)
        run: |
          curl -sL "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -o rcedit.exe
          rcedit.exe "dist\RachaelsTranscriber.exe" --set-version-string "FileDescription" "Rachael's Transcriber" --set-version-string "ProductName" "Rachael's Transcriber" --set-icon "assets\icon.ico"
          del rcedit.exe

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: RachaelsTranscriber-Windows
          path: dist/RachaelsTranscriber.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RachaelsTranscriber-Setup
          path: dist/RachaelsTranscriber-Setup.exe
