name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install webrtcvad-wheels

      - name: Build .exe
        run: |
          python -c "import sounddevice; from pathlib import Path; d=Path(sounddevice.__file__).parent/'_sounddevice_data'/'portaudio-binaries'; [f.unlink() for f in d.glob('*arm64*')]"
          pyinstaller --onefile --windowed --name "RachaelsTranscriber" --add-data "engine.py;." --add-data "assets;assets" --add-data "theme.json;." --additional-hooks-dir hooks --hidden-import webrtcvad --collect-data faster_whisper --hidden-import download_models --noconfirm --icon assets\icon.ico gui.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: RachaelsTranscriber-Windows
          path: dist/RachaelsTranscriber.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RachaelsTranscriber-Setup
          path: dist/RachaelsTranscriber-Setup.exe
